<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/SmartStudy/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <meta name="description" content="6세 어린이를 위한 종합 학습 앱 — 수학, 영어, 국어를 놀면서 배우자!" />
    <link rel="apple-touch-icon" href="/SmartStudy/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/SmartStudy/manifest.webmanifest" />
    <title>SmartStudy — 놀면서 배우자!</title>
    <!-- GitHub Pages SPA redirect receiver -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
